# Compose 文件格式版本（3.8 支持 depends_on condition / healthcheck 等特性）
version: "3.8"

services:

  # ══════════════════════════════════════════════════════════
  # db 服务 —— MySQL 8.0 数据库
  # ══════════════════════════════════════════════════════════
  db:
    # 使用官方 MySQL 8.0 镜像，固定小版本防止自动升级破坏兼容性
    image: mysql:8.0

    # 容器名称，方便 docker ps / docker logs 时识别
    container_name: mlbb_db

    # 数据库初始化环境变量（仅首次创建数据目录时生效）
    environment:
      # root 超级用户密码（仅容器内部使用，不对外暴露）
      MYSQL_ROOT_PASSWORD: root_secret
      # 自动创建的业务数据库名，对应 .env 里的 DB_NAME
      MYSQL_DATABASE: homework_db
      # 自动创建的普通用户，对应 .env 里的 DB_USER
      MYSQL_USER: student
      # 普通用户密码，对应 .env 里的 DB_PASSWORD
      MYSQL_PASSWORD: mlbb2026

    # 将 MySQL 数据目录挂载到具名卷，容器删除后数据不丢失
    volumes:
      - mysql_data:/var/lib/mysql

    # 健康检查：每 10 秒用 mysqladmin ping 探测一次，
    # 连续 5 次失败才判定不健康；启动后等 30 秒再开始探测。
    # app 服务的 depends_on condition 依赖此结果。
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    # 仅将端口暴露给宿主机，方便本地用 MySQL Workbench / DBeaver 连接调试。
    # 格式：宿主机端口:容器端口
    ports:
      - "3307:3306"   # 用 3307 避免与宿主机本地 MySQL 冲突


  # ══════════════════════════════════════════════════════════
  # app 服务 —— 运行 lesson5-2.py 的 Python 容器
  # ══════════════════════════════════════════════════════════
  app:
    # build 指定构建上下文为当前目录（读取同目录的 Dockerfile）
    build: .

    # 容器名称
    container_name: mlbb_app

    # 从 .env 文件批量注入环境变量（文件不进镜像，只在运行时读取）
    env_file:
      - .env

    # 用 environment 单独覆盖 DB_HOST：
    # .env 里写的是外网 IP，容器间通信要用 Compose 服务名 "db"。
    # Docker 内置 DNS 会将 "db" 解析为 db 容器的内网 IP。
    environment:
      DB_HOST: db

    # depends_on + condition：等待 db 服务的健康检查通过后再启动 app，
    # 避免 Python 脚本连接时 MySQL 还没初始化完成。
    depends_on:
      db:
        condition: service_healthy

    # 把容器内生成的 Excel 文件挂载回宿主机当前目录，
    # 这样脚本运行完毕后能直接在宿主机打开 hero_winrate.xlsx。
    volumes:
      - ./hero_winrate.xlsx:/app/hero_winrate.xlsx


# ══════════════════════════════════════════════════════════
# 具名卷 —— 由 Docker 统一管理，生命周期独立于容器
# ══════════════════════════════════════════════════════════
volumes:
  # mysql_data 卷存储 MySQL 的实际数据文件；
  # 执行 docker-compose down 不会删除此卷，需要 down -v 才会清除。
  mysql_data:
